# Zabbix Tool for Dify
# ====================
# Import this in Dify: Studio → Your Agent → Tools → Custom Tool → Create
# Replace YOUR_SERVER_IP with your actual server IP
# Add Authorization header: Bearer YOUR_ZABBIX_PROXY_TOKEN

openapi: 3.0.0
info:
  title: Infrastructure Monitoring API
  version: 1.0.0
  description: Check active alerts and infrastructure status
servers:
  - url: http://YOUR_SERVER_IP:5002
    description: Monitoring Proxy
paths:
  /summary:
    get:
      operationId: getInfrastructureSummary
      summary: Get infrastructure monitoring summary with alert counts
      description: Returns total active alerts and breakdown by severity level
      responses:
        '200':
          description: Summary of current infrastructure status
  /problems:
    get:
      operationId: getActiveAlerts
      summary: Get currently active alerts and problems
      description: Returns list of current active alerts with host and severity info
      parameters:
        - name: severity
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 5
          description: Minimum severity filter (0=not classified, 1=info, 2=warning, 3=average, 4=high, 5=disaster)
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Maximum number of results
      responses:
        '200':
          description: List of active problems
  /hosts:
    get:
      operationId: listMonitoredHosts
      summary: List all monitored infrastructure hosts
      description: Returns list of all monitored hosts with status and IP info
      parameters:
        - name: group
          in: query
          schema:
            type: string
          description: Filter by host group name
      responses:
        '200':
          description: List of hosts
  /host/{hostname}/problems:
    get:
      operationId: checkHostAlerts
      summary: Check alerts for a specific host
      description: Returns all active alerts for the specified host
      parameters:
        - name: hostname
          in: path
          required: true
          schema:
            type: string
          description: Host name or display name to search for
      responses:
        '200':
          description: Problems for the host
  /triggers:
    get:
      operationId: listActiveTriggers
      summary: List active monitoring triggers
      description: Returns list of triggers, optionally filtered to only those in problem state
      parameters:
        - name: problems_only
          in: query
          schema:
            type: boolean
            default: true
          description: Only show triggers currently in problem state
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Maximum number of results
      responses:
        '200':
          description: List of triggers
